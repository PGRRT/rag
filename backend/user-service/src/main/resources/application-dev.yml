server:
  port: 8081
spring:
  devtools:
    restart:
      enabled: true
  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB_USER}
    username: ${POSTGRES_USER_USER}
    password: ${POSTGRES_PASSWORD_USER}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@eureka:8761/eureka/

